name: update_stock

on:
  #push: # don't trigger workflow from push
  #  branches: ["main"]

  schedule:
    - cron: "0 9 * * *"
    # runs on 9:00 of everyday
    # 9:00 UTC = 17:00 Beijing
    # cron is usually delayed so it would probably start around 18:00
  workflow_dispatch:

permissions:
  contents: write
  # so github bot could commit changes

jobs:
  update-stocks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6

      - name: install dependencies
        run: |
          pip install --upgrade -r requirements.txt

      - name: Set DATE variable
        env:
          TZ: Asia/Shanghai
        run: |
          echo "STOCK_DATE=$(python market_utility.py --last_stock_date)" >> $GITHUB_ENV

      - name: check market open
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> ${GITHUB_OUTPUT}
            exit 0
          fi

          if python market_utility.py --open_today; then
            echo "should_run=true" >> ${GITHUB_OUTPUT}
          else
            echo "market closed today, skipping workflow"
            echo "should_run=false" >> ${GITHUB_OUTPUT}
          fi

      - name: clone quant-tracer
        if: steps.check.outputs.should_run == 'true'

        run: |
          git clone https://x-access-token:${{ secrets.KEY_QUANT_TRACER }}@github.com/w3ntao/quant-tracer.git
          pip install --upgrade -r quant-tracer/requirements.txt

      - name: trace stocks
        if: steps.check.outputs.should_run == 'true'

        run: |
          cd quant-tracer
          python quant_tracer.py

          timeout 40m python quant_tracer.py --blue
          timeout 1m  python quant_tracer.py --blue > "../history/blue_stocks_${STOCK_DATE}.txt"

          timeout 30m python quant_tracer.py --former_blue
          timeout 1m  python quant_tracer.py --former_blue > "../history/former_blue_stocks_${STOCK_DATE}.txt"

          cd ..
          printf '%s\n' "${STOCK_DATE}" > stock_date.txt

      - name: archive stock cache
        if: steps.check.outputs.should_run == 'true'
        run: |
          cd quant-tracer/cache
          zip -r "${GITHUB_WORKSPACE}/${STOCK_DATE}.zip" "${STOCK_DATE}"

      - name: commit changes
        id: commit
        if: steps.check.outputs.should_run == 'true'

        run: |
          git config user.name "Wentao Liu"
          git config user.email "wentao.liu.zero@outlook.com"

          git add history/*.txt stock_date.txt

          git commit -m "[ci-bot] daily update: ${STOCK_DATE}" || echo "No changes"
          git push -u origin main

          git checkout -B backup-${STOCK_DATE}
          git push -u origin backup-${STOCK_DATE}

      - name: publish stock cache release
        if: steps.check.outputs.should_run == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.STOCK_DATE }}
          name: cache-${{ env.STOCK_DATE }}
          body: |
            daily cache: ${{ env.STOCK_DATE }}
          files: ${{ env.STOCK_DATE }}.zip
